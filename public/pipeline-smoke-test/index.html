<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex, nofollow, noarchive, nosnippet" />
<title>NationGraph Demo App Template</title>
<style>
  :root{
    --bg:#0a1626; --bg-2:#0e1d33; --bg-3:#11243d;
    --line:#1c3252; --ink:#eaf1fb; --ink-dim:#9fb2cc; --ink-faint:#62789a;
    --accent:#76b900;            /* CLIENT BRAND COLOR — parameterized */
    --accent-soft:rgba(118,185,0,.13);
    --urgent:#ff5d5d; --good:#34d39c; --rfp:#3ea6ff; --pre:#c084fc;
    --mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
    --sans:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--ink);font-family:var(--sans);-webkit-font-smoothing:antialiased}
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
  a{color:inherit}

  /* header */
  .top{position:sticky;top:0;z-index:10;background:rgba(10,22,38,.9);backdrop-filter:blur(10px);
    border-bottom:1px solid var(--line);padding:16px 28px}
  .top-row{display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;max-width:1180px;margin:0 auto}
  .brandmark{display:flex;align-items:center;gap:11px;font-size:14px}
  .dot{width:9px;height:9px;border-radius:50%;background:var(--accent);box-shadow:0 0 14px var(--accent)}
  .brandmark b{font-weight:600}.brandmark .x{color:var(--ink-faint)}
  .cat-line{font-size:13px;color:var(--ink-dim);margin-top:2px}
  .live{font-family:var(--mono);font-size:11px;color:var(--ink-dim);display:flex;align-items:center;gap:7px}
  .live::before{content:"";width:6px;height:6px;border-radius:50%;background:var(--good);animation:pulse 2s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
  .maplink{font-family:var(--mono);font-size:12px;color:var(--accent);text-decoration:none;border:1px solid var(--line);
    padding:7px 13px;border-radius:8px;transition:.15s}
  .maplink:hover{border-color:var(--accent)}

  /* filter pills */
  .pills{display:flex;gap:9px;flex-wrap:wrap;max-width:1180px;margin:16px auto 0}
  .pill{display:flex;align-items:center;gap:8px;background:var(--bg-2);border:1px solid var(--line);
    color:var(--ink-dim);font-size:12.5px;padding:8px 13px;border-radius:999px;cursor:pointer;
    transition:.15s;user-select:none}
  .pill:hover{border-color:var(--accent);color:var(--ink)}
  .pill.on{background:var(--accent-soft);border-color:var(--accent);color:var(--ink)}
  .pill .c{font-family:var(--mono);font-size:11px;color:var(--ink-faint);
    background:var(--bg);padding:1px 7px;border-radius:999px;min-width:20px;text-align:center}
  .pill.on .c{color:var(--accent)}

  /* feed */
  .feed{max-width:1180px;margin:26px auto;padding:0 28px 60px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px}
  .signal{background:var(--bg-2);border:1px solid var(--line);border-radius:13px;padding:20px;
    cursor:pointer;transition:.18s;display:flex;flex-direction:column}
  .signal:hover{border-color:var(--accent);transform:translateY(-2px)}
  .sig-head{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}
  .sig-inst{font-weight:600;font-size:14.5px;line-height:1.3}
  .sig-inst .meta{display:block;color:var(--ink-faint);font-weight:400;font-size:11.5px;
    font-family:var(--mono);margin-top:3px}
  .sig-urg{font-family:var(--mono);font-size:10px;letter-spacing:.06em;text-transform:uppercase;
    padding:4px 8px;border-radius:999px;white-space:nowrap;flex:none}
  .u-urgent{background:rgba(255,93,93,.14);color:var(--urgent)}
  .u-rfp{background:rgba(62,166,255,.14);color:var(--rfp)}
  .u-pre{background:rgba(192,132,252,.14);color:var(--pre)}
  .sig-cat{font-family:var(--mono);font-size:11px;color:var(--accent);margin:13px 0 5px}
  .sig-title{font-size:14px;font-weight:600;line-height:1.35;margin-bottom:8px}
  .sig-body{font-size:13px;color:var(--ink-dim);line-height:1.55;flex:1}
  .sig-why{font-family:var(--mono);font-size:11.5px;color:var(--ink);margin-top:13px;
    padding-top:12px;border-top:1px dashed var(--line)}
  .sig-why b{color:var(--accent);font-weight:500}
  .sig-foot{display:flex;justify-content:space-between;align-items:center;margin-top:13px;
    font-family:var(--mono);font-size:11px;color:var(--ink-faint)}
  .sig-foot .pipe{color:var(--good)}
  .sig-src{color:var(--accent);text-decoration:none}
  .sig-src:hover{text-decoration:underline}

  /* expandable contacts */
  .contacts{max-height:0;overflow:hidden;transition:max-height .25s ease}
  .signal.open .contacts{max-height:240px}
  .contacts-inner{margin-top:13px;padding-top:13px;border-top:1px solid var(--line)}
  .contact{display:flex;justify-content:space-between;font-size:12px;padding:5px 0;color:var(--ink-dim)}
  .contact b{color:var(--ink);font-weight:500}
  .contact .role{font-family:var(--mono);font-size:11px;color:var(--ink-faint)}

  /* summary bar */
  .summary{position:sticky;bottom:0;background:rgba(10,22,38,.94);backdrop-filter:blur(10px);
    border-top:1px solid var(--line);padding:15px 28px;text-align:center;font-family:var(--mono);
    font-size:13px;color:var(--ink-dim)}
  .summary b{color:var(--ink);font-weight:600}
  .summary .sep{color:var(--ink-faint);margin:0 12px}

  .empty{grid-column:1/-1;text-align:center;color:var(--ink-faint);font-family:var(--mono);
    font-size:13px;padding:60px 0}

  @media (max-width:640px){.grid{grid-template-columns:1fr}.top,.feed,.summary{padding-left:16px;padding-right:16px}}
</style>
</head>
<body>
  <div class="top">
    <div class="top-row">
      <div>
        <div class="brandmark"><span class="dot"></span><b>NationGraph</b><span class="x">×</span><b id="co"></b></div>
        <div class="cat-line" id="catline"></div>
      </div>
      <div style="display:flex;align-items:center;gap:14px">
        <a class="maplink" id="maplink" href="#" target="_blank" rel="noopener">🗺 Spatial map →</a>
        <div class="live" id="live"></div>
      </div>
    </div>
    <div class="pills" id="pills"></div>
  </div>

  <div class="feed"><div class="grid" id="grid"></div></div>

  <div class="summary" id="summary"></div>

<script>
/* ================================================================
   THE BLANKS — one object IS the demo. New client = new DEMO object.
   The app code below never changes per client.
   ================================================================ */
const DEMO = {"brand":{"company":"Pipeline Smoke Test","accent":"#76b900","category":"Pipeline self-test","team":"deploy check","mapUrl":"/pipeline-smoke-test-spatial"},"categories":[{"key":"ai-gov","label":"🧠 AI Strategy / Governance"},{"key":"citizen","label":"💬 Citizen Services / 311-911"},{"key":"safety","label":"🚨 Public Safety AI"},{"key":"traffic","label":"🚦 Traffic / Mobility AI"},{"key":"smartcity","label":"🏙 Smart City / Spaces"},{"key":"infra","label":"🛣 Infra Inspection (CV)"},{"key":"datacenter","label":"⚡ Data Center / Energy"},{"key":"university","label":"🎓 University / Eng. Talent"}],"signals":[{"inst":"State of Utah","meta":"State Gov · UT","cat":"ai-gov","urgency":"rfp","x":243,"y":248,"title":"Statewide Generative-AI Governance \u0026 Compute RFP","body":"An active RFP to stand up a statewide GenAI governance framework plus the compute to run it — explicitly naming on-prem inference infrastructure and model evaluation.","why":"a direct, in-window compute + platform opportunity with the scope already public.","pipeline":1800000,"contacts":[{"name":"Alan Fuller","role":"State CIO"},{"name":"Dave Fletcher","role":"Chief Technology Officer"}],"src":"https://example.gov/utah-genai-rfp"},{"inst":"City of Las Vegas","meta":"Municipal · NV","cat":"traffic","urgency":"urgent","x":178,"y":300,"title":"Real-time traffic-AI pilot after fatal-crash spike","body":"Council minutes approving an emergency computer-vision traffic-management pilot following a 30% rise in intersection fatalities — vision inference at the edge.","why":"a crisis created immediate, funded need — move before the formal RFP.","pipeline":950000,"contacts":[{"name":"Mike Janssen","role":"Director of Public Works"},{"name":"Joanna Wadsworth","role":"Traffic Engineering Manager"}],"src":"https://example.gov/lasvegas-traffic-minutes"},{"inst":"Maricopa County","meta":"County · AZ","cat":"safety","urgency":"pre","x":212,"y":352,"title":"Board-approved public-safety AI budget","body":"County board approved a multi-year budget line for AI-assisted emergency-response and CV analytics — funded but not yet procured.","why":"the spend is approved but the RFP isn't out — this is the pre-RFP window.","pipeline":1200000,"contacts":[{"name":"Jen Pokorski","role":"Director of Emergency Management"}],"src":"https://example.gov/maricopa-safety-budget"},{"inst":"Arizona State University","meta":"University · AZ","cat":"university","urgency":"pre","x":230,"y":362,"title":"New AI research cluster — engineering talent pipeline","body":"ASU announced a research compute cluster expansion and an AI engineering program — a talent + hardware ecosystem play, not just a single sale.","why":"early relationship here seeds both compute revenue and a hiring pipeline.","pipeline":2400000,"contacts":[{"name":"Lev Gonick","role":"University CIO"}],"src":"https://example.gov/asu-ai-cluster"},{"inst":"City of Phoenix","meta":"Municipal · AZ","cat":"citizen","urgency":"rfp","x":206,"y":348,"title":"311 AI virtual-agent modernization RFP","body":"Active RFP to modernize the city's 311 system with an AI virtual agent and call routing — inference workload with clear scale.","why":"a citizen-services flagship with a named budget and timeline.","pipeline":780000,"contacts":[{"name":"Matthew Arvay","role":"Chief Information Officer"}],"src":"https://example.gov/phoenix-311-rfp"},{"inst":"Texas DOT","meta":"State Agency · TX","cat":"infra","urgency":"pre","x":470,"y":432,"title":"Bridge-inspection computer-vision program","body":"TxDOT strategic plan calls for CV-based automated bridge and road-surface inspection across the highway network — a large recurring inference workload.","why":"strategic-plan language signals a program forming before any solicitation.","pipeline":3100000,"contacts":[{"name":"Marc Williams","role":"Executive Director"}],"src":"https://example.gov/txdot-cv-inspection"}]};

/* ================================================================
   APP — reads DEMO, renders, filters. Never changes per client.
   ================================================================ */
const root = document.documentElement;
root.style.setProperty('--accent', DEMO.brand.accent);
const n = parseInt(DEMO.brand.accent.slice(1),16);
root.style.setProperty('--accent-soft', `rgba(${n>>16&255},${n>>8&255},${n&255},.13)`);

document.getElementById('co').textContent = DEMO.brand.company;
document.getElementById('catline').textContent = DEMO.brand.category;
document.getElementById('live').textContent = "Live · " + DEMO.brand.team;
const map = document.getElementById('maplink');
if(DEMO.brand.mapUrl){ map.href = DEMO.brand.mapUrl; } else { map.style.display='none'; }

const esc = s => String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const money = v => v>=1e6 ? `$${(v/1e6).toFixed(1)}M` : `$${(v/1e3).toFixed(0)}K`;
const S = DEMO.signals;

// derived filters: All + Urgent + categories + RFP + Pre-RFP
const urgencyFilters = [
  {key:"__urgent", label:"🔥 Urgent", test:s=>s.urgency==="urgent"},
  ...DEMO.categories.map(c=>({key:c.key,label:c.label,test:s=>s.cat===c.key})),
  {key:"__rfp", label:"📋 Active RFP", test:s=>s.urgency==="rfp"},
  {key:"__pre", label:"🔮 Pre-RFP Signal", test:s=>s.urgency==="pre"}
];
let active = "__all";

function urgClass(u){return u==="urgent"?"u-urgent":u==="rfp"?"u-rfp":"u-pre"}
function urgLabel(u){return u==="urgent"?"Urgent":u==="rfp"?"Active RFP":"Pre-RFP"}
function catLabel(k){const c=DEMO.categories.find(x=>x.key===k);return c?c.label:k}

function visible(){
  if(active==="__all") return S;
  const f = urgencyFilters.find(x=>x.key===active);
  return S.filter(f.test);
}

function renderPills(){
  const all = [{key:"__all",label:"All",count:S.length}]
    .concat(urgencyFilters.map(f=>({key:f.key,label:f.label,count:S.filter(f.test).length})));
  document.getElementById('pills').innerHTML = all.map(p=>
    `<div class="pill ${p.key===active?'on':''}" data-k="${p.key}">${esc(p.label)}<span class="c">${p.count}</span></div>`
  ).join('');
  document.querySelectorAll('.pill').forEach(el=>el.onclick=()=>{active=el.dataset.k;render()});
}

function renderFeed(){
  const list = visible();
  const grid = document.getElementById('grid');
  if(!list.length){grid.innerHTML=`<div class="empty">No signals in this view.</div>`;return}
  grid.innerHTML = list.map((s,idx)=>`
    <div class="signal" data-i="${S.indexOf(s)}">
      <div class="sig-head">
        <div class="sig-inst">${esc(s.inst)}<span class="meta">${esc(s.meta)}</span></div>
        <div class="sig-urg ${urgClass(s.urgency)}">${urgLabel(s.urgency)}</div>
      </div>
      <div class="sig-cat">${esc(catLabel(s.cat))}</div>
      <div class="sig-title">${esc(s.title)}</div>
      <div class="sig-body">${esc(s.body)}</div>
      <div class="sig-why"><b>Reach out because</b> — ${esc(s.why)}</div>
      <div class="sig-foot">
        <span>${s.contacts.length} contact${s.contacts.length!==1?'s':''} ▾</span>
        <span class="pipe">${money(s.pipeline)}</span>
      </div>
      <div class="contacts"><div class="contacts-inner">
        ${s.contacts.map(c=>`<div class="contact"><b>${esc(c.name)}</b><span class="role">${esc(c.role)}</span></div>`).join('')}
        ${s.src?`<div class="contact" style="border-top:1px dashed var(--line);margin-top:8px;padding-top:10px"><a class="sig-src" href="${esc(s.src)}" target="_blank" rel="noopener">View source →</a></div>`:''}
      </div></div>
    </div>`).join('');
  document.querySelectorAll('.signal').forEach(el=>el.onclick=()=>el.classList.toggle('open'));
}

function renderSummary(){
  const list = visible();
  const contacts = list.reduce((a,s)=>a+s.contacts.length,0);
  const pipe = list.reduce((a,s)=>a+s.pipeline,0);
  document.getElementById('summary').innerHTML =
    `<b>${list.length}</b> signals<span class="sep">·</span><b>${contacts}</b> named contacts<span class="sep">·</span><b>${money(pipe)}</b> ecosystem pipeline`;
}

function render(){renderPills();renderFeed();renderSummary()}
render();
</script>
</body>
</html>
