<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex, nofollow, noarchive, nosnippet" />
<title>NationGraph Demo · Spatial Map</title>
<style>
  :root{
    --bg:#0a1626; --bg-2:#0e1d33; --line:#1c3252;
    --ink:#eaf1fb; --ink-dim:#9fb2cc; --ink-faint:#62789a;
    --accent:#76b900; --accent-soft:rgba(118,185,0,.13);
    --urgent:#ff5d5d; --rfp:#3ea6ff; --pre:#c084fc; --good:#34d39c;
    --mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
    --sans:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--ink);font-family:var(--sans);-webkit-font-smoothing:antialiased;overflow-x:hidden}
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}

  .top{position:sticky;top:0;z-index:10;background:rgba(10,22,38,.9);backdrop-filter:blur(10px);
    border-bottom:1px solid var(--line);padding:16px 28px}
  .top-row{display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;max-width:1180px;margin:0 auto}
  .brandmark{display:flex;align-items:center;gap:11px;font-size:14px}
  .dot{width:9px;height:9px;border-radius:50%;background:var(--accent);box-shadow:0 0 14px var(--accent)}
  .brandmark b{font-weight:600}.brandmark .x{color:var(--ink-faint)}
  .cat-line{font-size:13px;color:var(--ink-dim);margin-top:2px}
  .backlink{font-family:var(--mono);font-size:12px;color:var(--accent);text-decoration:none;
    border:1px solid var(--line);padding:7px 13px;border-radius:8px;transition:.15s}
  .backlink:hover{border-color:var(--accent)}

  .wrap{max-width:1180px;margin:22px auto;padding:0 28px 40px;display:grid;
    grid-template-columns:1.6fr 1fr;gap:22px;align-items:start}
  @media (max-width:860px){.wrap{grid-template-columns:1fr}}

  .mapcard{background:var(--bg-2);border:1px solid var(--line);border-radius:16px;padding:14px;position:relative}
  svg.map{width:100%;height:auto;display:block}
  .usland{fill:#0e2138;stroke:var(--line);stroke-width:1.2}
  .pin{cursor:pointer}
  .pin .halo{opacity:.5;animation:ping 2.6s ease-out infinite}
  @keyframes ping{0%{r:5;opacity:.55}80%,100%{r:20;opacity:0}}
  .pin .core{stroke:#0a1626;stroke-width:1.5}
  .pin.sel .core{stroke:#fff;stroke-width:2.5}
  .legend{display:flex;gap:16px;flex-wrap:wrap;padding:12px 6px 4px;font-family:var(--mono);font-size:11px;color:var(--ink-dim)}
  .legend span{display:flex;align-items:center;gap:6px}
  .legend i{width:9px;height:9px;border-radius:50%;display:inline-block}

  .panel{background:var(--bg-2);border:1px solid var(--line);border-radius:16px;padding:22px;position:sticky;top:96px}
  .panel .hint{font-family:var(--mono);font-size:12px;color:var(--ink-faint);line-height:1.6}
  .p-inst{font-weight:600;font-size:16px}
  .p-meta{font-family:var(--mono);font-size:12px;color:var(--ink-faint);margin-top:3px}
  .p-urg{display:inline-block;font-family:var(--mono);font-size:10px;letter-spacing:.06em;text-transform:uppercase;
    padding:4px 9px;border-radius:999px;margin:14px 0}
  .u-urgent{background:rgba(255,93,93,.14);color:var(--urgent)}
  .u-rfp{background:rgba(62,166,255,.14);color:var(--rfp)}
  .u-pre{background:rgba(192,132,252,.14);color:var(--pre)}
  .p-cat{font-family:var(--mono);font-size:11px;color:var(--accent);margin-bottom:6px}
  .p-title{font-size:15px;font-weight:600;line-height:1.35;margin-bottom:9px}
  .p-body{font-size:13.5px;color:var(--ink-dim);line-height:1.6}
  .p-why{font-family:var(--mono);font-size:12px;margin-top:14px;padding-top:13px;border-top:1px dashed var(--line)}
  .p-why b{color:var(--accent);font-weight:500}
  .p-contacts{margin-top:16px;padding-top:14px;border-top:1px solid var(--line)}
  .p-contacts .l{font-family:var(--mono);font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-faint);margin-bottom:8px}
  .contact{display:flex;justify-content:space-between;font-size:12.5px;padding:5px 0;color:var(--ink-dim)}
  .contact b{color:var(--ink);font-weight:500}.contact .role{font-family:var(--mono);font-size:11px;color:var(--ink-faint)}
  .p-foot{display:flex;justify-content:space-between;align-items:center;margin-top:16px;font-family:var(--mono);font-size:12px}
  .p-foot .pipe{color:var(--good)}
  .p-src{color:var(--accent);text-decoration:none}.p-src:hover{text-decoration:underline}

  .summary{position:sticky;bottom:0;background:rgba(10,22,38,.94);backdrop-filter:blur(10px);
    border-top:1px solid var(--line);padding:15px 28px;text-align:center;font-family:var(--mono);font-size:13px;color:var(--ink-dim)}
  .summary b{color:var(--ink);font-weight:600}.summary .sep{color:var(--ink-faint);margin:0 12px}
</style>
</head>
<body>
  <div class="top">
    <div class="top-row">
      <div>
        <div class="brandmark"><span class="dot"></span><b>NationGraph</b><span class="x">×</span><b id="co"></b><span class="x">·</span><span style="color:var(--ink-dim);font-weight:400">Spatial map</span></div>
        <div class="cat-line" id="catline"></div>
      </div>
      <a class="backlink" id="back" href="#">← Signal dashboard</a>
    </div>
  </div>

  <div class="wrap">
    <div>
      <div class="mapcard">
        <svg class="map" id="map" viewBox="0 0 960 600" xmlns="http://www.w3.org/2000/svg" aria-label="Signal map"></svg>
      </div>
      <div class="legend">
        <span><i style="background:var(--urgent)"></i>Urgent</span>
        <span><i style="background:var(--rfp)"></i>Active RFP</span>
        <span><i style="background:var(--pre)"></i>Pre-RFP signal</span>
        <span style="color:var(--ink-faint)">· click a pin</span>
      </div>
    </div>
    <div class="panel" id="panel"></div>
  </div>

  <div class="summary" id="summary"></div>

<script>
/* ================================================================
   Same DEMO schema as the dashboard — shared in the real build.
   Spatial page adds {x,y} per signal (albersUsa canvas 960×600).
   ================================================================ */
const DEMO = {"brand":{"company":"Pipeline Smoke Test","accent":"#76b900","category":"Pipeline self-test","team":"deploy check","dashUrl":"/pipeline-smoke-test"},"categories":[{"key":"ai-gov","label":"🧠 AI Strategy / Governance"},{"key":"citizen","label":"💬 Citizen Services / 311-911"},{"key":"safety","label":"🚨 Public Safety AI"},{"key":"traffic","label":"🚦 Traffic / Mobility AI"},{"key":"smartcity","label":"🏙 Smart City / Spaces"},{"key":"infra","label":"🛣 Infra Inspection (CV)"},{"key":"datacenter","label":"⚡ Data Center / Energy"},{"key":"university","label":"🎓 University / Eng. Talent"}],"signals":[{"inst":"State of Utah","meta":"State Gov · UT","cat":"ai-gov","urgency":"rfp","x":243,"y":248,"title":"Statewide Generative-AI Governance \u0026 Compute RFP","body":"An active RFP to stand up a statewide GenAI governance framework plus the compute to run it — explicitly naming on-prem inference infrastructure and model evaluation.","why":"a direct, in-window compute + platform opportunity with the scope already public.","pipeline":1800000,"contacts":[{"name":"Alan Fuller","role":"State CIO"},{"name":"Dave Fletcher","role":"Chief Technology Officer"}],"src":"https://example.gov/utah-genai-rfp"},{"inst":"City of Las Vegas","meta":"Municipal · NV","cat":"traffic","urgency":"urgent","x":178,"y":300,"title":"Real-time traffic-AI pilot after fatal-crash spike","body":"Council minutes approving an emergency computer-vision traffic-management pilot following a 30% rise in intersection fatalities — vision inference at the edge.","why":"a crisis created immediate, funded need — move before the formal RFP.","pipeline":950000,"contacts":[{"name":"Mike Janssen","role":"Director of Public Works"},{"name":"Joanna Wadsworth","role":"Traffic Engineering Manager"}],"src":"https://example.gov/lasvegas-traffic-minutes"},{"inst":"Maricopa County","meta":"County · AZ","cat":"safety","urgency":"pre","x":212,"y":352,"title":"Board-approved public-safety AI budget","body":"County board approved a multi-year budget line for AI-assisted emergency-response and CV analytics — funded but not yet procured.","why":"the spend is approved but the RFP isn't out — this is the pre-RFP window.","pipeline":1200000,"contacts":[{"name":"Jen Pokorski","role":"Director of Emergency Management"}],"src":"https://example.gov/maricopa-safety-budget"},{"inst":"Arizona State University","meta":"University · AZ","cat":"university","urgency":"pre","x":230,"y":362,"title":"New AI research cluster — engineering talent pipeline","body":"ASU announced a research compute cluster expansion and an AI engineering program — a talent + hardware ecosystem play, not just a single sale.","why":"early relationship here seeds both compute revenue and a hiring pipeline.","pipeline":2400000,"contacts":[{"name":"Lev Gonick","role":"University CIO"}],"src":"https://example.gov/asu-ai-cluster"},{"inst":"City of Phoenix","meta":"Municipal · AZ","cat":"citizen","urgency":"rfp","x":206,"y":348,"title":"311 AI virtual-agent modernization RFP","body":"Active RFP to modernize the city's 311 system with an AI virtual agent and call routing — inference workload with clear scale.","why":"a citizen-services flagship with a named budget and timeline.","pipeline":780000,"contacts":[{"name":"Matthew Arvay","role":"Chief Information Officer"}],"src":"https://example.gov/phoenix-311-rfp"},{"inst":"Texas DOT","meta":"State Agency · TX","cat":"infra","urgency":"pre","x":470,"y":432,"title":"Bridge-inspection computer-vision program","body":"TxDOT strategic plan calls for CV-based automated bridge and road-surface inspection across the highway network — a large recurring inference workload.","why":"strategic-plan language signals a program forming before any solicitation.","pipeline":3100000,"contacts":[{"name":"Marc Williams","role":"Executive Director"}],"src":"https://example.gov/txdot-cv-inspection"}]};

/* simplified continental-US silhouette (albersUsa 960×600 canvas) */
const US_PATH="M150 210 L235 170 L300 150 L360 140 L430 130 L520 128 L610 120 L690 110 L770 118 L820 150 L835 200 L805 230 L815 270 L800 300 L770 330 L740 360 L700 400 L660 430 L620 455 L560 470 L520 485 L480 470 L440 470 L420 500 L400 510 L380 485 L360 470 L320 460 L300 430 L270 410 L240 395 L210 380 L185 350 L170 310 L150 270 Z";

const root=document.documentElement;
root.style.setProperty('--accent',DEMO.brand.accent);
const n=parseInt(DEMO.brand.accent.slice(1),16);
root.style.setProperty('--accent-soft',`rgba(${n>>16&255},${n>>8&255},${n&255},.13)`);
document.getElementById('co').textContent=DEMO.brand.company;
document.getElementById('catline').textContent=DEMO.brand.category;
const back=document.getElementById('back'); if(DEMO.brand.dashUrl) back.href=DEMO.brand.dashUrl;

const esc=s=>String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const money=v=>v>=1e6?`$${(v/1e6).toFixed(1)}M`:`$${(v/1e3).toFixed(0)}K`;
const urgColor=u=>u==="urgent"?"var(--urgent)":u==="rfp"?"var(--rfp)":"var(--pre)";
const urgClass=u=>u==="urgent"?"u-urgent":u==="rfp"?"u-rfp":"u-pre";
const urgLabel=u=>u==="urgent"?"Urgent":u==="rfp"?"Active RFP":"Pre-RFP";
const catLabel=k=>{const c=DEMO.categories.find(x=>x.key===k);return c?c.label:k};

// build map
const svg=document.getElementById('map');
let inner=`<path class="usland" d="${US_PATH}"/>`;
DEMO.signals.forEach((s,i)=>{
  inner+=`<g class="pin" data-i="${i}" transform="translate(${s.x},${s.y})">
    <circle class="halo" r="5" fill="${urgColor(s.urgency)}"/>
    <circle class="core" r="6" fill="${urgColor(s.urgency)}"/>
  </g>`;
});
svg.innerHTML=inner;

function showPanel(i){
  document.querySelectorAll('.pin').forEach(p=>p.classList.toggle('sel',+p.dataset.i===i));
  if(i==null){
    document.getElementById('panel').innerHTML=`<div class="hint">Each pin is a live signal, placed where the institution sits in ${esc(DEMO.brand.company)}'s territory. Click one to see the record, the named contacts, and the pipeline value.</div>`;
    return;
  }
  const s=DEMO.signals[i];
  document.getElementById('panel').innerHTML=`
    <div class="p-inst">${esc(s.inst)}</div>
    <div class="p-meta">${esc(s.meta)}</div>
    <span class="p-urg ${urgClass(s.urgency)}">${urgLabel(s.urgency)}</span>
    <div class="p-cat">${esc(catLabel(s.cat))}</div>
    <div class="p-title">${esc(s.title)}</div>
    <div class="p-body">${esc(s.body)}</div>
    <div class="p-why"><b>Reach out because</b> — ${esc(s.why)}</div>
    <div class="p-contacts"><div class="l">Named contacts</div>
      ${s.contacts.map(c=>`<div class="contact"><b>${esc(c.name)}</b><span class="role">${esc(c.role)}</span></div>`).join('')}
    </div>
    <div class="p-foot">
      ${s.src?`<a class="p-src" href="${esc(s.src)}" target="_blank" rel="noopener">View source →</a>`:'<span></span>'}
      <span class="pipe">${money(s.pipeline)}</span>
    </div>`;
}
document.querySelectorAll('.pin').forEach(p=>p.onclick=()=>showPanel(+p.dataset.i));
showPanel(null);

const contacts=DEMO.signals.reduce((a,s)=>a+s.contacts.length,0);
const pipe=DEMO.signals.reduce((a,s)=>a+s.pipeline,0);
document.getElementById('summary').innerHTML=
  `<b>${DEMO.signals.length}</b> signals<span class="sep">·</span><b>${contacts}</b> named contacts<span class="sep">·</span><b>${money(pipe)}</b> ecosystem pipeline`;
</script>
</body>
</html>
